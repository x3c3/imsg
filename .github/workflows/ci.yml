name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  macos:
    runs-on: macos-15
    env:
      SWIFTLINT_VERSION: 0.64.1
    steps:
      - uses: actions/checkout@v7
      - name: Swift version
        run: swift --version
      - name: Install SwiftLint
        run: |
          curl -fsSL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip" -o /tmp/swiftlint.zip
          unzip -q /tmp/swiftlint.zip -d /tmp/swiftlint
          sudo install -m 0755 /tmp/swiftlint/swiftlint /usr/local/bin/swiftlint
          swiftlint version
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Build
        run: make build ARCHES="$(uname -m)"

  linux-read-core:
    runs-on: ubuntu-latest
    container: swift:6.2.4-noble
    steps:
      - uses: actions/checkout@v7
      - name: Swift version
        run: swift --version
      - name: Install Python
        run: |
          apt-get update
          apt-get install -y --no-install-recommends python3
      - name: Generate version
        run: scripts/generate-version.sh
      - name: Resolve dependencies
        run: swift package resolve
      - name: Patch dependencies
        run: scripts/patch-deps.sh
      - name: Test Linux read core
        run: swift test
      - name: Build CLI
        run: swift build --product imsg
